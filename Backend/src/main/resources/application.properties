# ==========================================
# MedTrack Backend - Application Properties
# ==========================================

spring.application.name=MedTrack Backend

# ==========================================
# SERVER CONFIG
# ==========================================
# ==========================================
# SERVER CONFIG
# ==========================================
server.port=${PORT:8081}
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# ==========================================
# DATABASE CONFIG
# Choose ONE: H2 (dev) or MySQL (production)
# ==========================================

# --- OPTION 1: H2 In-Memory (Default for development - no setup needed) ---
spring.datasource.url=${DB_URL:jdbc:h2:mem:medtrackdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- OPTION 2: MySQL (Uncomment to use MySQL, set your credentials) ---
# spring.datasource.url=jdbc:mysql://localhost:3306/medtrackdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=your_password_here
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ==========================================
# JPA / HIBERNATE
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# LOGGING
# ==========================================
logging.level.com.medtrack=DEBUG
logging.level.org.springframework.security=INFO

# ==========================================
# ACTUATOR & MONITORING
# ==========================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ==========================================
# SUPPLIER CONFIGURATION PLACEHOLDERS
# ==========================================
supplier.orders-endpoint=${SUPPLIER_ORDERS_ENDPOINT:http://localhost:8081/api/supplier/orders}

# JWT / REFRESH TOKEN CONFIG
# ==========================================
app.jwt.refresh-expiration-days=7

# Account Lockout Cooldown Duration in Minutes
security.account.lock-duration=30

# OTP Configuration
security.otp.length=6
security.otp.expiry-minutes=10

# Rate Limiting Configuration
security.rate-limit.capacity=10
security.rate-limit.refill-tokens=10
security.rate-limit.refill-duration=1m

# JWT Secrets Config
app.jwt.secret=${JWT_SECRET:medtrack-super-secret-key-change-this-in-production-1234567890}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:604800000}
