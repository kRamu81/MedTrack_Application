# ==========================================
# MedTrack Backend - Application Properties
# ==========================================

spring.application.name=MedTrack Backend

# ==========================================
# SERVER CONFIG
# ==========================================
# ==========================================
# SERVER CONFIG
# ==========================================
server.port=${PORT:8081}
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# ==========================================
# DATABASE CONFIG
# Choose ONE: H2 (dev) or MySQL (production)
# ==========================================

# --- OPTION 1: H2 In-Memory (Default for development - no setup needed) ---
spring.datasource.url=${DATABASE_URL:${DB_URL:jdbc:h2:mem:medtrackdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${DATABASE_USERNAME:${DB_USERNAME:sa}}
spring.datasource.password=${DATABASE_PASSWORD:${DB_PASSWORD:}}
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- OPTION 2: MySQL (Uncomment to use MySQL, set your credentials) ---
# spring.datasource.url=jdbc:mysql://localhost:3306/medtrackdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=your_password_here
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ==========================================
# JPA / HIBERNATE
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# LOGGING
# ==========================================
logging.level.com.medtrack=DEBUG
logging.level.org.springframework.security=INFO

# ==========================================
# ACTUATOR & MONITORING
# ==========================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ==========================================
# SUPPLIER CONFIGURATION PLACEHOLDERS
# ==========================================
supplier.orders-endpoint=${SUPPLIER_ORDERS_ENDPOINT:http://localhost:8081/api/supplier/orders}

# JWT / REFRESH TOKEN CONFIG
# ==========================================
app.jwt.refresh-expiration-days=7

# Account Lockout Cooldown Duration in Minutes
security.account.lock-duration=30

# OTP Configuration
security.otp.length=6
security.otp.expiry-minutes=10

# Rate Limiting Configuration
security.rate-limit.capacity=10
security.rate-limit.refill-tokens=10
security.rate-limit.refill-duration=1m

# ==========================================
# KAFKA CONFIGURATION
# ==========================================
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.max.block.ms=3000
spring.kafka.producer.retries=0
app.kafka.topics.user-events=user-events

# Kafka Consumer Configuration
spring.kafka.consumer.group-id=supplier-order-sync
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.medtrack.*
app.kafka.topics.order-events=order-events

# ==========================================
# EUREKA DISCOVERY CLIENT
# ==========================================
spring.application.name=medtrack-backend
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${random.value}

# JWT Secrets Config
app.jwt.secret=${JWT_SECRET:medtrack-super-secret-key-change-this-in-production-1234567890}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}

# ==========================================
# SPRING BOOT ACTUATOR CONFIGURATION
# ==========================================
# Web Endpoint Exposure: Expose ONLY health and info
management.endpoints.web.exposure.include=health,info

# Show full details of the components in health endpoint
management.endpoint.health.show-details=always

# Enable health indicators
management.health.db.enabled=true
management.health.redis.enabled=true

# Info contributor metadata
info.app.name=MedTrack Backend
info.app.version=1.0.0
info.app.environment=development
info.app.description=MedTrack Backend Monitoring Service
