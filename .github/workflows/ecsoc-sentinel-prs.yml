name: ECSoC Sentinel PR Automation

on:
  pull_request_target:
    types: [opened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pr-automation:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Process Pull Request
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr_number = pr.number;
            const author = pr.user.login;

            const currentLabels = pr.labels ? pr.labels.map(l => l.name) : [];
            let labelsToAdd = new Set(['ECSoC26']);

            console.log("=== Workflow Triggered ===");
            console.log(`Trigger: ${context.eventName}`);
            console.log(`Actor: ${context.actor}`);
            console.log(`Labels before: ${currentLabels.join(', ')}`);

            // 1. Assign PR author
            try {
              await github.rest.issues.addAssignees({
                owner, repo, issue_number: pr_number,
                assignees: [author]
              });
            } catch (e) {
              console.log("Could not assign author:", e.message);
            }

            // 2. Determine changed files and apply labels
            try {
              const { data: files } = await github.rest.pulls.listFiles({
                owner, repo, pull_number: pr_number, per_page: 100
              });

              for (const file of files) {
                const path = file.filename.toLowerCase();
                if (path.includes('frontend/') || path.includes('src/') || path.includes('public/') || path.endsWith('.js') || path.endsWith('.jsx') || path.endsWith('.css')) {
                  labelsToAdd.add('frontend');
                }
                if (path.includes('backend/') || path.endsWith('.java') || path.endsWith('pom.xml')) {
                  labelsToAdd.add('backend');
                }
                if (path.endsWith('.md') || path.includes('docs/')) {
                  labelsToAdd.add('documentation');
                }
              }
            } catch (e) {
              console.log("Error fetching files:", e.message);
            }

            // 3. Apply labels
            const restricted = ['ECSoC26-L1', 'ECSoC26-L2', 'ECSoC26-L3', 'good-pr', 'good-ui', 'good-backend', 'good-issue'];
            const finalLabels = Array.from(labelsToAdd).filter(l => !currentLabels.includes(l) && !restricted.includes(l));
            
            if (finalLabels.length > 0) {
              await github.rest.issues.addLabels({
                owner, repo, issue_number: pr_number,
                labels: finalLabels
              });
            }
