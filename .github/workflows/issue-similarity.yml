name: Issue Similarity Check
on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  check-similarity:
    runs-on: ubuntu-latest
    steps:
      - name: Check for similar issues
        uses: actions-cool/issues-similarity-analysis@v1
        with:
          filter-threshold: 0.8
          title-excludes: 'bug, feature'
          comment-title: '### 🔎 Possible Duplicate Issues'
          comment-body: 'Please check if these issues might be related or a duplicate:'
