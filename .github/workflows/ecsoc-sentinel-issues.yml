name: ECSoC Sentinel Issue Automation

on:
  issues:
    types: [opened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  issue-automation:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Process Issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = issue.number;
            const creator = issue.user.login;

            let labelsToAdd = new Set(['ECSoC26']);
            const currentLabels = issue.labels ? issue.labels.map(l => l.name) : [];

            console.log("=== Workflow Triggered ===");
            console.log(`Trigger: ${context.eventName}`);
            console.log(`Actor: ${context.actor}`);
            console.log(`Labels before: ${currentLabels.join(', ')}`);

            // 1. Auto-assign creator
            try {
              await github.rest.issues.addAssignees({
                owner, repo, issue_number,
                assignees: [creator]
              });
            } catch (e) {
              console.log("Could not assign creator:", e.message);
            }

            // 2. Detect category
            const categories = ['bug', 'documentation', 'backend', 'frontend', 'enhancement'];
            let hasCategory = currentLabels.some(l => categories.includes(l));
            
            if (!hasCategory) {
              const content = (issue.title + " " + (issue.body || "")).toLowerCase();
              const keywordMap = {
                bug: ['bug', 'error', 'fail', 'fix', 'issue'],
                documentation: ['doc', 'readme', 'instructions'],
                backend: ['backend', 'api', 'server', 'database', 'spring', 'java'],
                frontend: ['frontend', 'ui', 'react', 'css', 'page', 'component'],
                enhancement: ['enhance', 'feature', 'add', 'improve', 'new']
              };

              let detected = false;
              for (const category of categories) {
                if (keywordMap[category].some(kw => content.includes(kw))) {
                  labelsToAdd.add(category);
                  detected = true;
                }
              }
              if (!detected) {
                labelsToAdd.add('enhancement');
              }
            }

            // 3. Check for newbie (first issue)
            try {
              const { data: userIssues } = await github.rest.issues.listForRepo({
                owner, repo,
                creator,
                state: 'all',
                per_page: 2
              });
              if (userIssues.length === 1) {
                labelsToAdd.add('newbie');
              }
            } catch (e) {
              console.log("Error checking user issues:", e.message);
            }

            // 4. Apply labels
            const finalLabels = Array.from(labelsToAdd).filter(l => !currentLabels.includes(l));
            if (finalLabels.length > 0) {
              await github.rest.issues.addLabels({
                owner, repo, issue_number,
                labels: finalLabels
              });
            }
