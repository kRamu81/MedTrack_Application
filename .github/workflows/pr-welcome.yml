name: PR Welcome Message
on:
  pull_request_target:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  pr-welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Welcome PR
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "🎉 Thanks for opening this PR!\n\nPlease ensure you have:\n- [ ] Linked an existing issue\n- [ ] Added tests if applicable\n- [ ] Followed Conventional Commits\n\nA reviewer will be assigned shortly."
            })
